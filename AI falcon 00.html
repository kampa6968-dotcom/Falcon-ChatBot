<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Falcon AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
color:white;
background:#000;
}

/* BACKGROUND (from your theme style) */
.background{
position:fixed;
inset:0;
z-index:-1;

background:linear-gradient(135deg,#050505,#0d0d20,#001a1a,#150020);
animation:bgShift 10s infinite alternate;
}

@keyframes bgShift{
from{filter:hue-rotate(0deg);}
to{filter:hue-rotate(80deg);}
}

/* MAIN BOX */
.panel{
width:900px;
max-width:95%;
margin:20px auto;
padding:20px;
border-radius:20px;

background:rgba(0,0,0,0.4);
border:1px solid rgba(0,255,255,0.2);
backdrop-filter:blur(10px);
}

/* CHAT */
#chat{
height:420px;
overflow-y:auto;
padding:10px;
background:rgba(255,255,255,0.05);
border-radius:10px;
}

.msg{
margin:8px 0;
padding:10px;
border-radius:8px;
}

.user{
background:#064;
}

.ai{
background:#222;
}

.input-area{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
border-radius:8px;
}

button{
padding:10px 15px;
cursor:pointer;
border:none;
border-radius:8px;
background:#00e5ff;
}

button:hover{
background:#00ff99;
}

</style>
</head>

</div>

</div>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Falcon AI - Siri Style</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
background:linear-gradient(135deg,#000,#001a1a,#12002b);
animation:move 10s infinite alternate;
z-index:-1;
}

@keyframes move{
from{filter:hue-rotate(0deg);}
to{filter:hue-rotate(90deg);}
}

.container{
width:800px;
margin:40px auto;
padding:20px;
border:1px solid cyan;
border-radius:15px;
background:rgba(0,0,0,0.5);
text-align:center;
}

#orb{
width:120px;
height:120px;
margin:20px auto;
border-radius:50%;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

#chat{
height:200px;
overflow:auto;
border:1px solid #333;
padding:10px;
margin-top:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h2>FALCON AI</h2>

<div id="orb"></div>

<div id="chat"></div>

<input id="text" placeholder="Say: Hey Falcon or type">

<br>

<button onclick="send()">Send</button>
<button onclick="startVoice()">Voice</button>
<button onclick="wakeWord()">Wake Word</button>

</div>

<script>

/* ================= MEMORY ================= */
let memory = {
name: localStorage.getItem("name") || null,
emotion: "neutral"
};

/* ================= EMOTION SYSTEM ================= */
function setEmotion(state){

memory.emotion = state;

let orb = document.getElementById("orb");

if(state === "happy"){
orb.style.borderColor = "lime";
orb.style.boxShadow = "0 0 20px lime";
}

else if(state === "sad"){
orb.style.borderColor = "blue";
orb.style.boxShadow = "0 0 20px blue";
}

else if(state === "angry"){
orb.style.borderColor = "red";
orb.style.boxShadow = "0 0 20px red";
}

else{
orb.style.borderColor = "cyan";
orb.style.boxShadow = "0 0 20px cyan";
}
}

/* ================= AI BRAIN ================= */
function getReply(text){

text = text.toLowerCase();

/* NAME MEMORY */
if(text.includes("my name is")){
let name = text.split("my name is")[1].trim();
memory.name = name;
localStorage.setItem("name", name);
setEmotion("happy");
return "Nice to meet you " + name;
}

/* WAKE RESPONSE */
if(text.includes("hey falcon")){
setEmotion("neutral");
return "Yes, I am listening.";
}

/* GREETING */
if(text.includes("hello") || text.includes("hi")){
setEmotion("happy");
return memory.name ? "Hello " + memory.name : "Hello!";
}

/* SAD TRIGGER */
if(text.includes("sad")){
setEmotion("sad");
return "I am here for you.";
}

/* ANGRY TRIGGER */
if(text.includes("angry")){
setEmotion("angry");
return "Please stay calm.";
}

setEmotion("neutral");

return "I am Falcon AI. I am still learning.";
}

/* ================= UI ================= */
function add(text){
let div = document.createElement("div");
div.innerText = text;
document.getElementById("chat").appendChild(div);
}

/* ================= SPEAK ================= */
function speak(text){
let s = new SpeechSynthesisUtterance(text);
s.rate = 1;
window.speechSynthesis.speak(s);
}

/* ================= SEND ================= */
function send(){

let input = document.getElementById("text");
let text = input.value.trim();
if(!text) return;

add("You: " + text);

let reply = getReply(text);

add("AI: " + reply);

speak(reply);

input.value="";
}

/* ================= VOICE ================= */
function startVoice(){

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition;

let rec = new SpeechRecognition();
rec.lang = "en-US";
rec.start();

rec.onresult = (e)=>{
let text = e.results[0][0].transcript;
document.getElementById("text").value = text;
send();
};
}

/* ================= WAKE WORD ================= */
function wakeWord(){

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition;

let rec = new SpeechRecognition();
rec.lang = "en-US";
rec.continuous = true;
rec.start();

rec.onresult = (e)=>{
let text = e.results[e.results.length-1][0].transcript.toLowerCase();

if(text.includes("hey falcon")){
document.getElementById("text").value = "hey falcon";
send();
}
};
}

const answers = {
"hello":"Hello, how can I help you?",
"hi":"Hi there!",
"software":"Software is a set of programs that run on a computer.",
"hardware":"Hardware is the physical parts of a computer.",
"ai":"AI is Artificial Intelligence that simulates human thinking.",
"math":"Mathematics is the study of numbers and logic.",
"science":"Science explains how the natural world works.",
"computer":"A computer processes data and runs programs.",
"time":"Time is the measurement of events.",
"date":()=> new Date().toDateString()
};


function getReply(text){
text = text.toLowerCase();

for(let key in answers){
if(text.includes(key)){
if(typeof answers[key] === "function"){
return answers[key]();
}
return answers[key];
}
}
}

return "I do not understand this yet.";
}

function addMessage(text,type){
const div = document.createElement("div");
div.className = "msg " + type;
div.innerText = text;

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight;
}


let lastAI = "";

function send(){
const input = document.getElementById("text");
const text = input.value.trim();
if(!text) return;

addMessage(text,"user");

const reply = getReply(text);
addMessage(reply,"ai");

lastAI = reply;

input.value = "";

/* LEVEL 3: VOICE OUTPUT */
speak(reply);
}


function startVoice(){

const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported in this browser");
return;
}

const rec = new SpeechRecognition();
rec.lang = "en-US";

rec.start();

rec.onresult = function(event){
const text = event.results[0][0].transcript;
document.getElementById("text").value = text;
send();
};
}


function speak(text){
const speech = new SpeechSynthesisUtterance(text);
speech.lang = "en-US";
speech.rate = 1;
window.speechSynthesis.speak(speech);
}

function speakLast(){
if(lastAI){
speak(lastAI);
}
}
</script>
</body>
</html>
</html>
